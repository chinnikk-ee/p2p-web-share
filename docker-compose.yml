# Local production-like stack. `docker compose up --build` then open
# http://localhost:8080. The browsers connect P2P; the backend only signals.
services:
  backend:
    container_name: p2p-backend
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 4000
      CORS_ORIGIN: http://localhost:8080
      LOG_LEVEL: info
      STUN_URLS: stun:stun.l.google.com:19302,stun:stun1.l.google.com:19302
      # Provide TURN_URL/TURN_USERNAME/TURN_CREDENTIAL for restrictive networks.
    ports:
      - '4000:4000'
    restart: unless-stopped

  frontend:
    container_name: p2p-frontend
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_SIGNALING_URL: http://localhost:4000
        VITE_STUN_URLS: stun:stun.l.google.com:19302,stun:stun1.l.google.com:19302
    ports:
      - '8080:80'
    depends_on:
      - backend
    restart: unless-stopped
